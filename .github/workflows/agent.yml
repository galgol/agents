name: Cursor code review on push

on:
  push:
    branches: [master, main]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # need previous commit to diff against

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Cursor SDK
        run: |
          npm init -y
          npm install @cursor/sdk tsx

      - name: Run Cursor review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: npx tsx .github/scripts/cursor-review.ts
